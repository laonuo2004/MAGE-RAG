defaults:
  - _self_
  - benchmarks: longdocurl
  - baselines: ocr
  - ablations: full
  - /llm_providers@llm_providers.litellm: litellm
  - /llm_providers@llm_providers.openrouter: openrouter

project:
  name: logma-rag
  seed: 42
  tags: []

paths:
  output_root: outputs

logging:
  level: DEBUG

hydra:
  job_logging:
    root:
      level: ${logging.level}
  run:
    dir: ${paths.output_root}/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ${paths.output_root}/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}_${hydra.job.override_dirname}
  job:
    chdir: false
    name: ${project.name}
    config:
      override_dirname:
        exclude_keys:
          - paths.output_root
          - project.tags
