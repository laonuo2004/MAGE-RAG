defaults:
  - _self_
  - benchmarks: test
  - baselines: image
  - ablations: full
  - hydra/job_logging: custom

llm_providers:
  litellm:
    base_url: http://localhost:4000/v1
    api_key: null
    model_mapping:
      Qwen2.5-VL-7B-Instruct: Qwen/Qwen2.5-VL-7B-Instruct
  openrouter:
    base_url: https://openrouter.ai/api/v1
    api_key: null

project:
  name: logma-rag
  seed: 42
  tags: []

paths:
  output_root: outputs

logging:
  level: INFO

hydra:
  run:
    dir: ${paths.output_root}/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ${paths.output_root}/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}_${hydra.job.override_dirname}
  job:
    chdir: false
    name: ${project.name}
    config:
      override_dirname:
        exclude_keys:
          - paths.output_root
          - project.tags
