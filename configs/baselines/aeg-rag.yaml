name: aeg-rag

params:
  policy: full
  graph_escape: false

agent:
  initial_retrieval: colpali_top1
  initial_retrieval_top_k: 5
  initial_retrieval_top_k_longdocurl: 5
  initial_retrieval_top_k_mmlongbench: 5
  run_online: false
  auto_activate_initial_page_nodes: true
  auto_open_initial_page_nodes: true
  auto_open_max_nodes_per_page: 24
  auto_open_max_nodes_per_page_longdocurl: 24
  auto_open_max_nodes_per_page_mmlongbench: 24
  final_open_active_nodes: true
  final_open_active_node_limit: 16
  final_open_active_node_limit_longdocurl: 24
  final_open_active_node_limit_mmlongbench: 8
  max_evaluator_candidate_actions: 120
  stop_policy: no_useful_action
  action_space:
    - ActivatePage
    - ActivateNode
    - OpenNode
    - FollowRelation
    - SearchEvidence
    - PruneNode
    - SummarizeNodes

evaluator:
  model_name: Qwen3-VL-8B-Instruct
  temperature: 0.0
  raw_text_char_limit_per_opened_node: 1200
  include_images_for_opened_nodes: false
  include_images_for_active_nodes: false
  candidate_preview_char_limit: 160
  retries: 2

renderer:
  reader_text_mode: compact
  mmlongbench_prompt_mode: plain
  mmlongbench_include_image_page_labels: true
  mmlongbench_include_opened_node_crops: false
  mmlongbench_max_opened_node_crops: 4
  include_opened_node_text: true
  include_opened_node_text_longdocurl: true
  include_opened_node_text_mmlongbench: false
  opened_node_text_char_limit: 1200
  mmlongbench_page_text_char_limit: 1200
  mmlongbench_page_text_max_pages: 1
  include_page_images: true
  include_opened_node_images: true
  raw_text_char_limit_per_opened_node: 8192
  pruned_visible_to_reader: false

safety:
  watchdog_iterations: 8
  watchdog_repeated_noop_rounds: 2
