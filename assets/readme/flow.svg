<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="620" viewBox="0 0 1800 620" role="img" aria-labelledby="title desc">
  <title id="title">MAGE-RAG detailed workflow</title>
  <desc id="desc">Animated workflow of MAGE-RAG showing offline multigranular evidence graph construction, query-time page grounding, evidence state control actions, budgeted iteration, and structured multimodal reader rendering.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="52%" stop-color="#f6fbf8"/>
      <stop offset="100%" stop-color="#fff8f1"/>
    </linearGradient>
    <linearGradient id="flow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d9488"/>
      <stop offset="48%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="loop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-20%" width="136%" height="145%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.11"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowOrange" markerWidth="14" markerHeight="14" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 z" fill="#f97316"/>
    </marker>
  </defs>

  <rect width="1800" height="620" rx="32" fill="url(#bg)"/>
  <text x="900" y="54" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="850" fill="#0f172a">MAGE-RAG: Query-Time Evidence Subgraph Construction</text>
  <text x="900" y="84" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" fill="#475569">from long PDF pages to a compact, auditable, multimodal evidence state</text>

  <path d="M 142 322 C 360 246 525 246 702 322 S 1030 402 1198 322 S 1440 248 1658 322" fill="none" stroke="url(#flow)" stroke-width="8" stroke-linecap="round" stroke-dasharray="18 16" opacity="0.72">
    <animate attributeName="stroke-dashoffset" from="0" to="-272" dur="7s" repeatCount="indefinite"/>
  </path>

  <g filter="url(#shadow)">
    <rect x="62" y="118" width="330" height="400" rx="24" fill="#ffffff" stroke="#dbeafe"/>
    <rect x="426" y="118" width="290" height="400" rx="24" fill="#ffffff" stroke="#ccfbf1"/>
    <rect x="750" y="118" width="520" height="400" rx="24" fill="#ffffff" stroke="#ddd6fe"/>
    <rect x="1304" y="118" width="430" height="400" rx="24" fill="#ffffff" stroke="#fed7aa"/>
  </g>

  <!-- Offline graph -->
  <text x="92" y="158" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800" fill="#1d4ed8">Offline Evidence Graph</text>
  <text x="92" y="184" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#64748b">build once per document</text>

  <g transform="translate(105 222)">
    <rect x="0" y="0" width="86" height="116" rx="10" fill="#eff6ff" stroke="#93c5fd"/>
    <rect x="14" y="16" width="58" height="10" rx="5" fill="#60a5fa"/>
    <rect x="14" y="38" width="58" height="10" rx="5" fill="#bfdbfe"/>
    <rect x="14" y="60" width="58" height="10" rx="5" fill="#bfdbfe"/>
    <rect x="14" y="82" width="58" height="18" rx="5" fill="#dbeafe"/>
    <text x="43" y="146" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#1e3a8a">page nodes</text>
  </g>

  <g transform="translate(235 214)">
    <circle cx="28" cy="30" r="20" fill="#ecfeff" stroke="#06b6d4"/>
    <rect x="80" y="12" width="60" height="36" rx="9" fill="#f0fdf4" stroke="#22c55e"/>
    <path d="M48 30 L80 30" stroke="#94a3b8" stroke-width="3"/>
    <circle cx="28" cy="98" r="20" fill="#fff7ed" stroke="#f97316"/>
    <rect x="80" y="80" width="60" height="36" rx="9" fill="#faf5ff" stroke="#8b5cf6"/>
    <path d="M48 98 L80 98" stroke="#94a3b8" stroke-width="3"/>
    <path d="M28 50 L28 78" stroke="#94a3b8" stroke-width="3" stroke-dasharray="5 5"/>
    <text x="70" y="146" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#334155">element nodes</text>
  </g>

  <g transform="translate(96 394)">
    <text x="0" y="0" font-family="SFMono-Regular, Consolas, monospace" font-size="14" fill="#0f172a">Edges:</text>
    <text x="0" y="27" font-family="SFMono-Regular, Consolas, monospace" font-size="13" fill="#475569">containment • reading order</text>
    <text x="0" y="52" font-family="SFMono-Regular, Consolas, monospace" font-size="13" fill="#475569">layout • section hierarchy</text>
    <text x="0" y="77" font-family="SFMono-Regular, Consolas, monospace" font-size="13" fill="#475569">semantic neighbor</text>
  </g>

  <!-- Page grounding -->
  <text x="456" y="158" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800" fill="#0f766e">Initial Grounding</text>
  <text x="456" y="184" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#64748b">page-level visual retrieval</text>
  <g transform="translate(472 228)">
    <rect x="0" y="0" width="200" height="78" rx="18" fill="#ecfdf5" stroke="#5eead4"/>
    <text x="100" y="32" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" fill="#0f766e">ColPali Top-k</text>
    <text x="100" y="56" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="13" fill="#134e4a">query × page embeddings</text>
  </g>
  <g transform="translate(478 350)">
    <rect x="0" y="0" width="188" height="44" rx="14" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="94" y="28" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="14" fill="#0f172a">ActivatePage(P0)</text>
    <rect x="0" y="60" width="188" height="44" rx="14" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="94" y="88" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="14" fill="#0f172a">entry budget: k</text>
  </g>

  <!-- Online controller -->
  <text x="782" y="158" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800" fill="#6d28d9">Online Evidence Controller</text>
  <text x="782" y="184" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#64748b">stateful, budgeted, auditable query-time decisions</text>

  <path d="M 824 338 C 830 230, 1192 230, 1198 338 C 1190 462, 832 462, 824 338" fill="none" stroke="url(#loop)" stroke-width="5" stroke-dasharray="14 12" opacity="0.82">
    <animate attributeName="stroke-dashoffset" from="0" to="-208" dur="5.6s" repeatCount="indefinite"/>
  </path>

  <g transform="translate(802 224)">
    <rect x="0" y="0" width="190" height="78" rx="18" fill="#f5f3ff" stroke="#c4b5fd"/>
    <text x="95" y="29" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="800" fill="#6d28d9">Evidence State</text>
    <text x="95" y="54" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="12" fill="#0f172a">Inactive / Active</text>
    <text x="95" y="70" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="12" fill="#0f172a">Opened / Pruned</text>
  </g>

  <g transform="translate(1032 224)">
    <rect x="0" y="0" width="190" height="78" rx="18" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="95" y="29" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="800" fill="#1d4ed8">Candidates</text>
    <text x="95" y="54" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="12" fill="#0f172a">page elements</text>
    <text x="95" y="70" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="12" fill="#0f172a">graph neighbors</text>
  </g>

  <g transform="translate(802 366)">
    <rect x="0" y="0" width="420" height="94" rx="20" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="210" y="30" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="800" fill="#c2410c">XML Evaluator Decision</text>
    <text x="210" y="56" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="12.5" fill="#0f172a">ActivateNode • OpenNode • SearchEvidence</text>
    <text x="210" y="76" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="12.5" fill="#0f172a">PruneNode • Stop</text>
  </g>

  <g transform="translate(888 318)">
    <rect x="0" y="0" width="246" height="34" rx="17" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="123" y="23" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="12.5" fill="#334155">budgets: k, a, Amax, T, Bo</text>
  </g>

  <!-- Renderer / Reader -->
  <text x="1334" y="158" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800" fill="#c2410c">Structured Reader Input</text>
  <text x="1334" y="184" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#64748b">materialize only selected evidence</text>

  <g transform="translate(1344 224)">
    <rect x="0" y="0" width="338" height="102" rx="18" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="169" y="32" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" fill="#c2410c">Render Evidence Subgraph</text>
    <text x="169" y="59" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="13" fill="#0f172a">XML + page images</text>
    <text x="169" y="80" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="13" fill="#0f172a">node images / bbox crops</text>
  </g>

  <g transform="translate(1368 370)">
    <rect x="0" y="0" width="290" height="70" rx="18" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="145" y="29" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" fill="#0f172a">LVLM Reader</text>
    <text x="145" y="53" text-anchor="middle" font-family="SFMono-Regular, Consolas, monospace" font-size="13" fill="#475569">grounded answer + trace metadata</text>
  </g>

  <!-- Arrows -->
  <path d="M392 318 L426 318" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M716 318 L750 318" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M1270 318 L1304 318" stroke="#f97316" stroke-width="4" marker-end="url(#arrowOrange)"/>

  <g transform="translate(120 552)">
    <rect x="0" y="0" width="1560" height="38" rx="19" fill="#ffffff" stroke="#e2e8f0" opacity="0.95"/>
    <text x="780" y="25" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#334155">Key idea: MAGE-RAG treats retrieval as a controllable evidence-state update process, not a fixed Top-k context concatenation step.</text>
  </g>
</svg>
