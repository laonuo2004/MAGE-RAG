defaults:
  - _self_
  - benchmarks: longdocurl
  - baselines: ocr
  - ablations: full

litellm:
  base_url: http://localhost:4000/v1
  api_key: "none"

project:
  name: logma-rag
  seed: 42
  tags: []

paths:
  output_root: outputs

logging:
  level: INFO
  httpx_level: WARNING
  httpcore_level: WARNING
  openai_level: WARNING
  pil_level: WARNING
  pil_pngimageplugin_level: WARNING

hydra:
  job_logging:
    root:
      level: ${logging.level}
  run:
    dir: ${paths.output_root}/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: ${paths.output_root}/multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}_${hydra.job.override_dirname}
  job:
    chdir: false
    name: ${project.name}
    config:
      override_dirname:
        exclude_keys:
          - paths.output_root
          - project.tags
